services:
  - type: web
    name: flipkart-scraper
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    # All values are set in the Render dashboard → Environment.
    # sync: false means "do not check this value into render.yaml".
    envVars:
      # ── Flipkart + Gmail (required) ──────────────────────────────────────
      - key: FLIPKART_USERNAME
        sync: false
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      - key: GMAIL_TOKEN_JSON
        sync: false          # paste contents of token.json after local OAuth setup
      - key: FLIPKART_AUTH_STATE
        sync: false          # paste contents of auth_state.json after first scrape

      # ── Salesforce sync (optional — leave blank to skip sync) ────────────
      - key: SF_TOKEN_URL
        sync: false
      - key: SF_CLIENT_ID
        sync: false
      - key: SF_CLIENT_SECRET
        sync: false
      - key: SF_API_ENDPOINT
        sync: false

      # ── Runtime ──────────────────────────────────────────────────────────
      - key: HEADLESS
        value: "true"
